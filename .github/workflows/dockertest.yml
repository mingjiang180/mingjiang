name: Test Docker-in-Docker (Build Only)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: nv-smj-1gpu-test

    steps:
      - name: 🧪 Check Docker Connectivity
        run: docker --tlscacert="" version
      - name: env
        run: |
          export RUNNER_TEMP="/home/runner/_work/nv-smj-1gpu-test-59dzg-runner-2n2hg"
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        # 此时仓库中的 Dockerfile 已可用
      - name: Debug secrets (DO NOT USE IN PRODUCTION)
        run: |
          echo "User: ${{ secrets.REGISTRY_USER }}"
          
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}  # 强烈建议用 Token 而非密码！
          
      - name: 🏗️ Build Docker Image
        run: |
          IMAGE_NAME=test-dind:${GITHUB_SHA::8}
          docker  build -t $IMAGE_NAME .

      - name: 🔍 Verify Image
        run: docker  images | grep test-dind

      - name: 🧹 Cleanup
        if: always()
        run: docker system prune -af
