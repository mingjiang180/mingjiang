name: Sync Multi-Arch Actions Runner Image

on:
  workflow_dispatch: # 支持手动触发
  schedule:
    - cron: '0 2 * * *' # 每天凌晨2点自动检查

jobs:
  sync-image:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (Source)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Harbor (Target)
        uses: docker/login-action@v3
        with:
          registry: harbor.baai.ac.cn
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Get source image digest (ghcr.io)
        id: get_source_digest
        run: |
          # 获取源镜像的多架构 Manifest 摘要
          SOURCE_DIGEST=$(docker buildx imagetools inspect ghcr.io/actions/actions-runner:latest --format '{{json .Manifest.Digest}}')
          echo "digest=${SOURCE_DIGEST}" >> $GITHUB_OUTPUT
          echo "Source image digest: $SOURCE_DIGEST"

      - name: Get target image digest (harbor.baai.ac.cn)
        id: get_target_digest
        run: |
          # 尝试获取目标镜像的摘要，如果不存在则返回空
          TARGET_DIGEST=$(docker buildx imagetools inspect harbor.baai.ac.cn/baai-infra/actions-runner:latest --format '{{json .Manifest.Digest}}' 2>/dev/null || echo "")
          echo "digest=${TARGET_DIGEST}" >> $GITHUB_OUTPUT
          echo "Target image digest: $TARGET_DIGEST"

      - name: Sync multi-arch image using imagetools
        if: steps.get_source_digest.outputs.digest != steps.get_target_digest.outputs.digest
        run: |
          echo "Digests do not match. Syncing multi-arch image from GHCR to Harbor..."
          
          # 核心修正：使用 buildx imagetools create 直接复制多架构清单
          # 它不会在本地拉取镜像层，而是直接在远程仓库间同步 AMD64 和 ARM64 的镜像数据
          docker buildx imagetools create \
            --tag harbor.baai.ac.cn/baai-infra/actions-runner:latest \
            ghcr.io/actions/actions-runner:latest
          
          echo "Successfully synced the latest multi-arch image to Harbor."

      - name: Skip sync if already up to date
        if: steps.get_source_digest.outputs.digest == steps.get_target_digest.outputs.digest
        run: |
          echo "The Harbor image is already the latest version (both amd64 and arm64). No action needed."
