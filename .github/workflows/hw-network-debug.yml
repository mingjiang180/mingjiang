name: hw Network Connectivity Debug

on:
  # 允许在 GitHub 页面上手动触发运行
  workflow_dispatch:
  # 如果需要，可以取消注释下面两行，让它在推送到 main 分支时自动触发
  # push:
  #   branches: [ "main" ]

jobs:
  network-test:
    runs-on: hw-test-v1
    # 指定运行环境的容器镜像
    container:
      image: harbor.baai.ac.cn/baai-infra/actions-runner:ubuntu-22.04
      # 如果你的 Harbor 镜像仓库需要登录凭证，请取消下面三行的注释，并在 GitHub Repo Settings -> Secrets 中配置
      # credentials:
      #   username: ${{ secrets.HARBOR_USERNAME }}
      #   password: ${{ secrets.HARBOR_PASSWORD }}
    steps:
      - name: 保持容器运行 (睡眠 30 分钟)
        shell: sh
        run: |
          echo "=================================================="
          echo "💤 容器即将进入循环等待模式，保持运行 30 分钟..."
          echo "⏰ 开始时间：$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=================================================="
          
          # 循环 30 次，每次睡 60 秒（1分钟）
          i=1
          while [ $i -le 30 ]; do
            echo "⏳ 已运行第 $i 分钟，容器状态正常..."
            sleep 60
            i=$((i + 1))
          done || true  # 加上保险，防止意外退出报错

          echo "=================================================="
          echo "💤 30分钟等待结束，工作流即将关闭。"
          echo "⏰ 结束时间：$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=================================================="
