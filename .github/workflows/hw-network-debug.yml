name: hw Network Connectivity Debug

on:
  # 允许在 GitHub 页面上手动触发运行
  workflow_dispatch:
  # 如果需要，可以取消注释下面两行，让它在推送到 main 分支时自动触发
  # push:
  #   branches: [ "main" ]

jobs:
  network-test:
    runs-on: hw-test-v1
    # 指定运行环境的容器镜像
    container:
      image: harbor.baai.ac.cn/baai-infra/actions-runner:ubuntu-22.04-arm64
      # 如果你的 Harbor 镜像仓库需要登录凭证，请取消下面三行的注释，并在 GitHub Repo Settings -> Secrets 中配置
      # credentials:
      #   username: ${{ secrets.HARBOR_USERNAME }}
      #   password: ${{ secrets.HARBOR_PASSWORD }}
    steps:
      - name: 保持容器运行 (睡眠 30 分钟)
        shell: sh
        run: |
          echo "=================================================="
          echo "💤 容器即将进入睡眠模式，保持运行 30 分钟..."
          echo "⏳ 你可以在 GitHub Actions 页面查看实时日志，或手动连接排查。"
          echo "⏰ 预计结束时间：$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=================================================="
          sleep 1800 || true  # 核心命令：睡1800秒，即使被中断也视为成功
          echo "💤 睡眠结束，工作流即将关闭。"
