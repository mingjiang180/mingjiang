name: hw Network Connectivity Debug

on:
  # 允许在 GitHub 页面上手动触发运行
  workflow_dispatch:
  # 如果需要，可以取消注释下面两行，让它在推送到 main 分支时自动触发
  # push:
  #   branches: [ "main" ]

jobs:
  network-test:
    runs-on: hw-test-v1
    
    # 指定运行环境的容器镜像
    container:
      image: harbor.baai.ac.cn/baai-infra/actions-runner:ubuntu-22.04-arm64
      # 如果你的 Harbor 镜像仓库需要登录凭证，请取消下面三行的注释，并在 GitHub Repo Settings -> Secrets 中配置
      # credentials:
      #   username: ${{ secrets.HARBOR_USERNAME }}
      #   password: ${{ secrets.HARBOR_PASSWORD }}
      options: >-
        -e "NO_PROXY=localhost,127.0.0.1,flagos.net,.flagos.net,10.1.12.38"
        -e "no_proxy=localhost,127.0.0.1,flagos.net,.flagos.net,10.1.12.38"

    steps:

      - name: 诊断网络连通性 (纯原生 sh 兼容)
        shell: sh  # 显式指定使用 sh，去掉 -e 限制
        run: |
          TARGET_HOST="flagcicd-inner.flagos.net"
          TARGET_PORT="8000"          
          
          echo "=== 正在尝试直连探测 $TARGET_HOST:$TARGET_PORT ==="
          
          # 使用纯原生底层套接字直连，不依赖 ping，不依赖 nc
          if (exec 3<>/dev/tcp/"$TARGET_HOST"/"$TARGET_PORT") 2>/dev/null; then
            echo "✅ 成功！！！容器可以直连到目标端口 $TARGET_PORT！"
            exec 3>&-
          else
            echo "❌ 仍然失败！"
            echo "如果还失败，说明该容器网段被物理防火墙/宿主机 iptables 彻底拦截了。"
          fi
