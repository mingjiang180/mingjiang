name: hw Network Connectivity Debug

on:
  # 允许在 GitHub 页面上手动触发运行
  workflow_dispatch:
  # 如果需要，可以取消注释下面两行，让它在推送到 main 分支时自动触发
  # push:
  #   branches: [ "main" ]

jobs:
  network-test:
    runs-on: hw-test-v1
    
    # 指定运行环境的容器镜像
    container:
      image: harbor.baai.ac.cn/baai-infra/actions-runner:ubuntu-22.04-arm64
      # 如果你的 Harbor 镜像仓库需要登录凭证，请取消下面三行的注释，并在 GitHub Repo Settings -> Secrets 中配置
      # credentials:
      #   username: ${{ secrets.HARBOR_USERNAME }}
      #   password: ${{ secrets.HARBOR_PASSWORD }}
      options: --network host

    steps:

      - name: 诊断网络连通性 (纯原生 sh 兼容)
        shell: sh  # 显式指定使用 sh，去掉 -e 限制
        run: |
          TARGET_HOST="flagcicd-inner.flagos.net"
          TARGET_PORT="8000"          
          
          echo "=================================================="
          echo " 开始诊断容器内到 $TARGET_HOST 的网络状况 "
          echo "=================================================="
          echo ""
          
          echo "=== 1. 尝试查看容器内置的 DNS 配置 ==="
          cat /etc/resolv.conf || echo "无法读取 /etc/resolv.conf"
          echo "--------------------------------------------------"

          echo "=== 2. 测试 Ping (如果系统支持) ==="
          # 发送 2 个包，限时 3 秒
          ping -c 2 -w 3 "$TARGET_HOST" || ping -c 2 "$TARGET_HOST" || echo "⚠️ Ping 失败或系统无 ping 命令"
          echo "--------------------------------------------------"

          echo "=== 3. 终极测试：原生 TCP 端口连通性 ==="
          echo "正在尝试建立到 $TARGET_HOST:$TARGET_PORT 的连接..."
          
          # 使用 sh 兼容的底层文件重定向探测端口
          # 如果连不上，通常会卡住或直接拒绝
          if (exec 3<>/dev/tcp/"$TARGET_HOST"/"$TARGET_PORT") 2>/dev/null; then
            echo "✅ 成功！容器可以直接连通到目标端口 $TARGET_PORT"
            # 关闭文件描述符
            exec 3>&-
          else
            echo "❌ 失败！容器无法连接到目标端口 $TARGET_PORT"
            echo "可能原因：1. DNS 无法解析该域名；2. 宿主机禁止了容器网段的出网流量；3. 目标服务器防火墙拦截。"
          fi
          echo "=================================================="
