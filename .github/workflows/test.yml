name: Actions Runner Controller Demo
on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: flagscale-v1.9-doud
    env:
      DOCKER_HOST: tcp://localhost:2375
      DOCKER_TLS_VERIFY: "0"
      DOCKER_CERT_PATH: ""
    steps:
      - name: 🔍 Debug Docker Setup
        run: |
          echo "User: $(whoami)"
          echo "HOME: $HOME"
          echo "DOCKER_HOST: $DOCKER_HOST"
          echo "DOCKER_TLS_VERIFY: $DOCKER_TLS_VERIFY"
          echo "DOCKER_CERT_PATH: $DOCKER_CERT_PATH"
          echo "Files in ～/.docker:"
          ls -la ～/.docker || echo "No .docker dir"
        
      - name: 🕵️‍♂️ Hunt for hidden Docker config
        run: |
          echo "=== Check all possible config locations ==="
          find / -name "config.json" -path "*/.docker/*" 2>/dev/null || echo "No config.json found"
      
          echo "=== Content of ～/.docker ==="
          cat ～/.docker/config.json 2>/dev/null || echo "No config.json in home"
      
          echo "=== Docker context list ==="
          docker --tlscacert="" context ls
